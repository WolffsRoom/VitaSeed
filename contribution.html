<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribution Graph - VitaSeed</title>
    <link rel="icon" href="seed.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111111; /* Obsidian dark background */
        }
        
        #network-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .floating-ui {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .floating-ui > * {
            pointer-events: auto;
        }

        .btn-back {
            top: 1.5rem;
            left: 1.5rem;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: 0.2s;
        }
        .btn-back:hover {
            background: rgba(50, 50, 50, 0.9);
            color: #fff;
            border-color: var(--accent-green);
        }

        .graph-legend {
            bottom: 2rem;
            right: 2rem;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #bbb;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .legend-item:last-child {
            margin-bottom: 0;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Vis.js Tooltip Customization to match Obsidian */
        div.vis-tooltip {
            position: absolute;
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 0.85rem;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.9) !important;
            border: 1px solid #444 !important;
            border-radius: 6px !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8) !important;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    
    <div class="floating-ui btn-back-container" style="top:0; left:0;">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar ao VitaSeed</a>
    </div>

    <div class="floating-ui graph-legend">
        <div style="margin-bottom: 10px; font-weight: bold; color: #fff;">Graph View</div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #9d7cd8;"></div> Desenvolvedores
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #4fd6be;"></div> Projetos
        </div>
    </div>

    <div id="network-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // DEVS
            const nodes = new vis.DataSet([
                { id: 'wolff', label: 'Wolff', group: 'dev' },
                { id: 'meninosung', label: 'MeninoSung', group: 'dev' },
                { id: 'dayos', label: 'DayOS', group: 'dev' },
                { id: 'grarak', label: 'Grarak', group: 'dev' },
                { id: 'bren', label: 'bren', group: 'dev' },
                { id: 'parindraaa', label: 'Parindraaa', group: 'dev' },
                
                // PROJECTS
                { id: 'beach', label: 'Beach Buggy', group: 'project' },
                { id: 'zombie', label: 'Zombie Tsunami', group: 'project' },
                { id: 'greenvita', label: 'GreenVita', group: 'project' },
                { id: 'dsvita', label: 'DSVita', group: 'project' },
                { id: 'atelier', label: 'Atelier Ayesha PTBR', group: 'project' },
                { id: 'nodrt', label: 'NoDRTrophiesGODOT', group: 'project' },
                { id: 'ac', label: 'Animal Crossing', group: 'project' },
                { id: 'cards', label: 'Adventura Time - Cards', group: 'project' }
            ]);

            const edges = new vis.DataSet([
                { from: 'wolff', to: 'beach' },
                { from: 'meninosung', to: 'beach' },
                { from: 'wolff', to: 'zombie' },
                { from: 'meninosung', to: 'zombie' },
                
                { from: 'wolff', to: 'atelier' },
                { from: 'wolff', to: 'nodrt' },
                { from: 'dayos', to: 'greenvita' },
                { from: 'grarak', to: 'dsvita' },
                { from: 'bren', to: 'ac' },
                { from: 'parindraaa', to: 'cards' }
            ]);

            const container = document.getElementById('network-container');
            const data = { nodes: nodes, edges: edges };
            
            // Obsidian Style Options
            const options = {
                nodes: {
                    shape: 'dot',
                    size: 10, // Small dots like Obsidian
                    font: { 
                        color: '#a0a0a0', 
                        size: 14,
                        face: 'Inter, sans-serif',
                        strokeWidth: 0,
                        vadjust: -5
                    },
                    borderWidth: 0,
                    shadow: {
                        enabled: true,
                        color: 'rgba(0,0,0,0.5)',
                        size: 10,
                        x: 0,
                        y: 0
                    }
                },
                edges: {
                    color: {
                        color: '#444444',
                        highlight: '#888888',
                        hover: '#666666'
                    },
                    width: 1,
                    smooth: {
                        type: 'continuous'
                    }
                },
                groups: {
                    dev: {
                        color: { background: '#9d7cd8' }, // Purple-ish for devs
                        font: { color: '#c0a0ff' }
                    },
                    project: {
                        color: { background: '#4fd6be' }, // Teal for projects
                        font: { color: '#70e0d0' }
                    }
                },
                physics: {
                    forceAtlas2Based: {
                        gravitationalConstant: -120, // Spread them out
                        centralGravity: 0.005,
                        springLength: 150,
                        springConstant: 0.04
                    },
                    maxVelocity: 50,
                    solver: 'forceAtlas2Based',
                    timestep: 0.35,
                    stabilization: { iterations: 150 }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 100,
                    zoomView: true,
                    dragView: true
                }
            };

            const network = new vis.Network(container, data, options);
        });
    </script>
</body>
</html>
